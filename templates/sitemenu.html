{{/* Menu template. */}}
<nav class="site-nav">
  <div class="nav-links">
  {{ range $i, $element := .Site.Type "default" }}
    {{ if not $element.Draft }}
      <a href="{{ url $element.Slug }}">{{ $element.Title }}</a>
    {{ end }}
  {{ end }}
    <a href="/postlist.html">Posts</a>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
    <span id="theme-icon">☀️</span>
  </button>
</nav>
<script>
function toggleTheme() {
  var html = document.documentElement;
  var current = html.getAttribute('data-theme');
  var next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('theme-icon').textContent = next === 'dark' ? '🌙' : '☀️';
  var hljsLink = document.getElementById('hljs-theme');
  if (next === 'dark') {
    hljsLink.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css';
  } else {
    hljsLink.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
  }
}
(function() {
  var theme = document.documentElement.getAttribute('data-theme') || 'light';
  document.getElementById('theme-icon').textContent = theme === 'dark' ? '🌙' : '☀️';
})();
</script>
