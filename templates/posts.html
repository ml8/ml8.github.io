{{/* Menu template. */}}

<div id="postmenu">
<h3>Posts</h3>
<div class="post-list">
{{ range $i, $element := .Site.Type "post" }}
  {{ if not $element.Draft }}
    <div class="post-list-item">
      <a href="{{ url $element.Slug }}">{{ $element.Title }}</a>
      <span class="post-list-date">{{ $element.Date.Format "January 2, 2006" }}</span>
    </div>
  {{ end }}
{{ end }}
</div>
</div>
